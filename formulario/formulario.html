<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" href="formulario.css">
</head>

<body>

    <header class="cabecalho-topo">
        <button id="btn-voltar" onclick="voltarLogin()">← Voltar</button>
    </header>

    

    <form action="#" method="post">

        <h1>Cadastro</h1>

        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

        <label for="nome_mae">Nome da mãe:</label>
        <input type="text" id="nome_mae" name="nome_mae" placeholder="nome da mae"  required>

        <label for="nome_pai">Nome do pai:</label>
        <input type="text" id="nome_pai" name="nome_pai" placeholder="nome do pai"  required>

        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" placeholder= "00000-000"  required>

        <label for="rua">Rua:</label>
        <input type="text" id="rua" name="rua" required>

        <label for="numero">Número:</label>
        <input type="text" id="numero" name="numero" required>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade" required>

        <label for="estado">Estado (UF):</label>
<select id="estado" name="estado" required>
    <option value="" disabled selected>Selecione seu estado</option>
    <option value="AC">Acre (AC)</option>
    <option value="AL">Alagoas (AL)</option>
    <option value="AP">Amapá (AP)</option>
    <option value="AM">Amazonas (AM)</option>
    <option value="BA">Bahia (BA)</option>
    <option value="CE">Ceará (CE)</option>
    <option value="DF">Distrito Federal (DF)</option>
    <option value="ES">Espírito Santo (ES)</option>
    <option value="GO">Goiás (GO)</option>
    <option value="MA">Maranhão (MA)</option>
    <option value="MT">Mato Grosso (MT)</option>
    <option value="MS">Mato Grosso do Sul (MS)</option>
    <option value="MG">Minas Gerais (MG)</option>
    <option value="PA">Pará (PA)</option>
    <option value="PB">Paraíba (PB)</option>
    <option value="PR">Paraná (PR)</option>
    <option value="PE">Pernambuco (PE)</option>
    <option value="PI">Piauí (PI)</option>
    <option value="RJ">Rio de Janeiro (RJ)</option>
    <option value="RN">Rio Grande do Norte (RN)</option>
    <option value="RS">Rio Grande do Sul (RS)</option>
    <option value="RO">Rondônia (RO)</option>
    <option value="RR">Roraima (RR)</option>
    <option value="SC">Santa Catarina (SC)</option>
    <option value="SP">São Paulo (SP)</option>
    <option value="SE">Sergipe (SE)</option>
    <option value="TO">Tocantins (TO)</option>
</select>


        <label for="pais">País:</label>
        <input type="text" id="pais" name="pais" required>

        <label for="situacao">Situação do Ensino Médio:</label>
        <select id="situacao" name="situacao">
            <option value="concluido">Concluído</option>
            <option value="nao_concluido">Não Concluído</option>
        </select>

        <label for="escola">Tipo de escola:</label>
        <select id="escola" name="escola">
            <option value="publica">Pública</option>
            <option value="privada">Pivada</option>
        </select>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="senha">

        <label for="cfm_senha">Confirme sua Senha</label>
        <input type="password" id="cfm_senha" name="cfm_senha" placeholder="Confirme sua senha">

        

        <button type="submit">Salvar Inscrição</button>

    </form>

    <script src="formulario.js"></script>


</body>

</html>
