<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="cursos.css">
<title>Cursos Disponíveis</title>
</head>
<body>

    <h1>Cursos Disponíveis</h1>

    <select name="curso" id="curso">
        <option value="">Selecione um curso</option>
    
 
        <optgroup label="Ciências Exatas e Engenharias">
            <option value="ciencia-computacao">Ciência da Computação</option>
            <option value="engenharia-computacao">Engenharia da Computação</option>
            <option value="engenharia-civil">Engenharia Civil</option>
            <option value="engenharia-eletrica">Engenharia Elétrica</option>
            <option value="engenharia-mecanica">Engenharia Mecânica</option>
            <option value="engenharia-producao">Engenharia de Produção</option>
            <option value="engenharia-quimica">Engenharia Química</option>
            <option value="arquitetura">Arquitetura e Urbanismo</option>
            <option value="matematica">Matemática</option>
            <option value="fisica">Física</option>
            <option value="estatistica">Estatística</option>
        </optgroup>
    

        <optgroup label="Saúde e Ciências Biológicas">
            <option value="medicina">Medicina</option>
            <option value="enfermagem">Enfermagem</option>
            <option value="odontologia">Odontologia</option>
            <option value="fisioterapia">Fisioterapia</option>
            <option value="psicologia">Psicologia</option>
            <option value="nutricao">Nutrição</option>
            <option value="farmacia">Farmácia</option>
            <option value="medicina-veterinaria">Medicina Veterinária</option>
            <option value="biomedicina">Biomedicina</option>
            <option value="ciencias-biologicas">Ciências Biológicas</option>
            <option value="educacao-fisica">Educação Física</option>
        </optgroup>
    

        <optgroup label="Ciências Humanas e Sociais">
            <option value="direito">Direito</option>
            <option value="administracao">Administração</option>
            <option value="ciencias-contabeis">Ciências Contábeis</option>
            <option value="pedagogia">Pedagogia</option>
            <option value="jornalismo">Jornalismo</option>
            <option value="publicidade">Publicidade e Propaganda</option>
            <option value="relacoes-internacionais">Relações Internacionais</option>
            <option value="ciencias-economicas">Ciências Econômicas</option>
            <option value="historia">História</option>
            <option value="geografia">Geografia</option>
            <option value="letras">Letras</option>
        </optgroup>

        <optgroup label="Cursos Tecnológicos (Mais rápidos)">
            <option value="ads">Análise e Desenvolvimento de Sistemas (ADS)</option>
            <option value="gestao-ti">Gestão de Tecnologia da Informação</option>
            <option value="defesa-cibernetica">Defesa Cibernética</option>
            <option value="rh">Gestão de Recursos Humanos</option>
            <option value="marketing">Marketing</option>
            <option value="logistica">Logística</option>
            <option value="gestao-financeira">Gestão Financeira</option>
            <option value="comercio-exterior">Comércio Exterior</option>
        </optgroup>
    </select>
    

    <div id="resultado"></div>

</body>
</html>
